name: "EKS Fargate - Destroy Infrastructure"

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Type 'destroy' to confirm infrastructure destruction"
        required: true
        type: string

permissions:
  contents: read
  issues: write

env:
  TF_VAR_environment: ${{ vars.ENVIRONMENT }}
  TF_VAR_project_name: ${{ vars.PROJECT_NAME }}
  TF_VAR_owner_name: ${{ vars.OWNER_NAME }}
  TF_VAR_aws_region: ${{ vars.AWS_REGION }}
  TF_VAR_vpc_cidr: ${{ vars.VPC_CIDR }}
  TF_VAR_kubernetes_version: ${{ vars.KUBERNETES_VERSION }}
  TF_VAR_node_or_fargate: ${{ vars.NODE_OR_FARGATE }}
  TF_VAR_aws_profile: ""

jobs:
  destroy:
    name: "Terraform Destroy"
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm_destroy == 'destroy'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9.0"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.BUCKET_BACKEND }}" \
            -backend-config="key=${{ vars.KEY_BACKEND }}" \
            -backend-config="region=${{ vars.AWS_REGION }}"

      - name: Cleanup K8s LoadBalancer services before destroy
        run: |
          aws eks update-kubeconfig --region ${{ vars.AWS_REGION }} --name ${{ vars.ENVIRONMENT }}-${{ vars.PROJECT_NAME }}-eks
          kubectl delete svc --all -n tienda --ignore-not-found=true || true
          echo "Waiting 60s for AWS to release LB resources..."
          sleep 60

      - name: Terraform Destroy
        run: terraform destroy -auto-approve

      - name: Close destroy issues
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'destroy-pending',
              state: 'open'
            });
            for (const issue of issues.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed'
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `## Infrastructure Destroyed\n\nDestroyed at: ${new Date().toISOString()}\nRun: [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
              });
            }

  reject:
    name: "Destroy Rejected"
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm_destroy != 'destroy'
    steps:
      - name: Reject
        run: |
          echo "Destroy rejected. Input was '${{ github.event.inputs.confirm_destroy }}' instead of 'destroy'."
          exit 1
