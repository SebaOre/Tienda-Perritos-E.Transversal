name: "EKS Fargate or Node Group- Deploy Infrastructure"

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  TF_VAR_environment: ${{ vars.ENVIRONMENT }}
  TF_VAR_project_name: ${{ vars.PROJECT_NAME }}
  TF_VAR_owner_name: ${{ vars.OWNER_NAME }}
  TF_VAR_aws_region: ${{ vars.AWS_REGION }}
  TF_VAR_vpc_cidr: ${{ vars.VPC_CIDR }}
  TF_VAR_kubernetes_version: ${{ vars.KUBERNETES_VERSION }}
  TF_VAR_node_or_fargate: ${{ vars.NODE_OR_FARGATE }}
  TF_VAR_apps_repository: ${{ vars.APPS_REPOSITORY}}
  TF_VAR_node_group_instance_types: ${{ vars.NODE_GROUP_INSTANCE_TYPES }}
  TF_VAR_node_group_capacity_type: ${{ vars.NODE_GROUP_CAPACITY_TYPE }}
  TF_VAR_aws_profile: ""

jobs:
  deploy:
    name: "Terraform Deploy"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9.0"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.BUCKET_BACKEND }}" \
            -backend-config="key=${{ vars.KEY_BACKEND }}" \
            -backend-config="region=${{ vars.AWS_REGION }}"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -out=tfplan -no-color

      - name: Terraform Apply
        id: apply
        run: terraform apply tfplan

      - name: Get deployment outputs
        id: outputs
        run: |
          echo "cluster_name=$(terraform output -raw cluster_name)" >> $GITHUB_OUTPUT
          echo "cluster_endpoint=$(terraform output -raw cluster_endpoint)" >> $GITHUB_OUTPUT

      - name: Create destroy issue on successful deploy
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Destroy EKS Fargate Infrastructure - ${new Date().toISOString().slice(0, 10)}`,
              body: [
                '## Infrastructure Deployed Successfully',
                '',
                `**Cluster:** \`${{ steps.outputs.outputs.cluster_name }}\``,
                `**Endpoint:** \`${{ steps.outputs.outputs.cluster_endpoint }}\``,
                `**Environment:** ${{ vars.ENVIRONMENT }}`,
                `**Region:** ${{ vars.AWS_REGION }}`,
                `**Deployed at:** ${new Date().toISOString()}`,
                `**Commit:** ${context.sha}`,
                `**Run:** [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                '',
                '---',
                '',
                '## Destroy Infrastructure',
                '',
                'To destroy the infrastructure, run the **Destroy** workflow:',
                '',
                `1. Go to [Actions > EKS Fargate - Destroy Infrastructure](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/workflows/destroy.yml)`,
                '2. Click **Run workflow**',
                '3. Type \`destroy\` to confirm',
                '',
                '> Warning: This will permanently delete the EKS cluster, Fargate profiles, and all related infrastructure.',
                '',
                '---',
                `_Auto-generated by deploy workflow run #${context.runNumber}_`
              ].join('\n'),
              labels: ['infrastructure', 'destroy-pending']
            });
            core.info(`Created issue #${issue.data.number}: ${issue.data.html_url}`);
